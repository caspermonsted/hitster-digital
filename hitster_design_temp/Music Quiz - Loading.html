<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Side A — Preparing your set</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #f1e1dc;
      --bg-card:     #f9ece8;
      --ink:         #1f1715;
      --ink-soft:    #4a3a36;
      --rule:        #dcc4bd;
      --rule-soft:   #ead7d0;
      --muted:       #7a5e58;
      --accent:      #c4533a;
      --accent-soft: #d4a13a;
      --on-accent:   #fff;
      --font-display:'Playfair Display', serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      width: 100vw; height: 100vh;
    }

    /* portrait rotate prompt */
    .rotate {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      z-index: 9999; padding: 40px; text-align: center;
    }
    .rotate-icon {
      width: 56px; height: 80px;
      border: 2.5px solid var(--ink);
      border-radius: 8px;
      animation: rotate-icon 2s ease-in-out infinite;
    }
    @keyframes rotate-icon {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }
    .rotate-title { font-family: var(--font-display); font-style: italic; font-size: 32px; font-weight: 800; }
    .rotate-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--muted); }
    @media (orientation: portrait) and (max-width: 900px) {
      .rotate { display: flex; }
      .app { display: none !important; }
    }

    /* ─── app ─── */
    .app {
      width: 100vw; height: 100vh;
      max-width: 1400px; margin: 0 auto;
      padding: 14px calc(env(safe-area-inset-right, 0) + 24px) calc(env(safe-area-inset-bottom, 0) + 18px) calc(env(safe-area-inset-left, 0) + 24px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-areas: "head" "stage" "foot";
      gap: 12px;
    }

    /* ─── masthead ─── */
    .head {
      grid-area: head;
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--rule);
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.22em; color: var(--muted);
    }
    .head-c {
      font-family: var(--font-display); font-style: italic;
      font-size: 14px; letter-spacing: 0; color: var(--ink);
    }

    /* ─── stage ─── */
    .stage {
      grid-area: stage;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 38%);
      gap: 30px;
      align-items: center;
      min-height: 0;
      padding: 4px 0;
    }

    /* ─── stack of records ─── */
    .crate {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      height: 100%;
      min-height: 0;
    }
    .deck {
      position: relative;
      width: min(100%, 280px);
      aspect-ratio: 1.4 / 1;
    }
    .platter {
      position: absolute;
      left: 5%; bottom: 6%;
      width: 80%; aspect-ratio: 1;
      border-radius: 50%;
      background: #2a221c;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04),
                  0 12px 36px rgba(31,23,21,0.22);
    }
    .platter::after {
      content: ''; position: absolute;
      inset: 8%; border-radius: 50%;
      background: #4a3f36;
      opacity: 0.5;
    }

    /* the records stack; one is "live" spinning on the platter */
    .record {
      position: absolute;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%,
          #181410 0 22%,
          #2a221c 22% 22.5%,
          #181410 22.5% 32%,
          #2a221c 32% 32.5%,
          #181410 32.5% 42%,
          #2a221c 42% 42.5%,
          #181410 42.5% 100%);
      box-shadow: 0 6px 18px rgba(31, 23, 21, 0.25);
    }
    .record-label {
      position: absolute; left: 50%; top: 50%;
      width: 34%; aspect-ratio: 1; transform: translate(-50%, -50%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display); font-style: italic;
      color: #fff; font-size: 10px; font-weight: 800;
      letter-spacing: 0.04em;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.18);
    }
    .record-hole {
      position: absolute; left: 50%; top: 50%;
      width: 6px; height: 6px; margin: -3px 0 0 -3px;
      border-radius: 50%; background: var(--bg);
    }
    /* stack on the right — going UP */
    .stack-r1, .stack-r2, .stack-r3 {
      right: -8%; width: 38%; aspect-ratio: 1;
    }
    .stack-r1 { bottom: 18%; transform: rotate(-3deg); }
    .stack-r2 { bottom: 32%; transform: rotate(2deg); animation: stack-drop 4s ease-in-out infinite; }
    .stack-r3 { bottom: 46%; transform: rotate(-4deg); animation: stack-drop 4s ease-in-out 1s infinite; opacity: 0.85; }
    @keyframes stack-drop {
      0%   { transform: translateY(-32px) rotate(0deg); opacity: 0; }
      35%  { transform: translateY(0) rotate(-3deg); opacity: 1; }
      100% { transform: translateY(0) rotate(-3deg); opacity: 1; }
    }
    /* the one on the platter, spinning */
    .live {
      left: 8%; bottom: 9%;
      width: 74%; aspect-ratio: 1;
      animation: spin 5s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* tonearm cueing in */
    .arm {
      position: absolute;
      right: 4%; top: 4%;
      width: 4px; height: 60%;
      background: linear-gradient(to bottom, #444, #888);
      border-radius: 2px;
      transform-origin: top right;
      animation: arm-cue 6s ease-in-out infinite;
    }
    .arm::after {
      content: ''; position: absolute; bottom: -8px; left: -8px;
      width: 18px; height: 18px; border-radius: 3px;
      background: #555;
    }
    .arm::before {
      content: ''; position: absolute; top: -4px; right: -4px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #888;
    }
    @keyframes arm-cue {
      0%, 8%  { transform: rotate(8deg); }
      20%     { transform: rotate(28deg); }
      80%     { transform: rotate(28deg); }
      92%, 100% { transform: rotate(8deg); }
    }

    /* dust/sparkle motion lines */
    .spark {
      position: absolute;
      width: 6px; height: 1px;
      background: var(--accent);
      opacity: 0;
      animation: spark 2.2s ease-out infinite;
    }
    .spark:nth-child(7) { left: 30%; top: 30%; animation-delay: 0s; }
    .spark:nth-child(8) { left: 18%; top: 50%; animation-delay: 0.4s; }
    .spark:nth-child(9) { left: 28%; top: 70%; animation-delay: 0.8s; }
    @keyframes spark {
      0%   { transform: translate(0,0) scaleX(0); opacity: 0; }
      30%  { opacity: 0.7; transform: translate(0,0) scaleX(1); }
      100% { transform: translate(-22px, -6px) scaleX(0); opacity: 0; }
    }

    /* ─── right side: copy + log ─── */
    .info { display: flex; flex-direction: column; gap: 12px; min-width: 0; }
    .info-kicker {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.24em; color: var(--accent);
      display: flex; align-items: center; gap: 10px;
    }
    .info-kicker-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    .info-title {
      font-family: var(--font-display); font-style: italic;
      font-weight: 900;
      font-size: clamp(38px, 5.4vw, 60px);
      line-height: 0.92; letter-spacing: -0.03em;
      margin: 0; color: var(--ink);
    }
    .info-tagline {
      font-family: var(--font-display); font-style: italic;
      font-size: 15px; color: var(--ink-soft);
      line-height: 1.4; font-weight: 500;
      max-width: 420px;
    }
    .info-tagline em { color: var(--accent); }

    /* mini "filter" chips reflecting setup */
    .filter-row {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-top: 4px;
    }
    .filter {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.14em; color: var(--ink);
      border: 1px solid var(--ink); padding: 4px 8px;
    }

    /* live log */
    .log {
      margin-top: 4px;
      border-top: 1px solid var(--rule);
      padding-top: 10px;
      display: flex; flex-direction: column; gap: 4px;
      min-height: 70px;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--muted); letter-spacing: 0.04em;
    }
    .log-line {
      display: flex; align-items: baseline; gap: 8px;
      animation: log-in 0.4s ease-out both;
    }
    .log-line-tick {
      flex: 0 0 12px;
      color: var(--accent);
    }
    .log-line.done .log-line-tick { color: var(--green); }
    .log-line em {
      font-family: var(--font-display); font-style: italic;
      color: var(--ink); font-size: 13px; letter-spacing: 0;
    }
    @keyframes log-in {
      from { opacity: 0; transform: translateX(-6px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ─── footer: groove progress + count ─── */
    .foot {
      grid-area: foot;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 18px;
      align-items: center;
      padding-top: 8px;
      border-top: 1px solid var(--rule);
    }
    .foot-left {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.18em; color: var(--muted);
    }
    .foot-left em {
      font-family: var(--font-display); font-style: italic;
      color: var(--ink); font-size: 13px;
      letter-spacing: 0;
    }
    .groove {
      position: relative;
      height: 16px;
      display: flex; align-items: center;
    }
    .groove-track {
      width: 100%; height: 100%;
      background:
        repeating-linear-gradient(to right,
          transparent 0 5px,
          var(--rule) 5px 6px);
    }
    .groove-fill {
      position: absolute; left: 0; top: 0; bottom: 0;
      width: 0%;
      background:
        repeating-linear-gradient(to right,
          transparent 0 5px,
          var(--accent) 5px 6px);
      transition: width 0.4s ease;
    }
    .groove-head {
      position: absolute; top: 50%;
      width: 8px; height: 8px; margin: -4px 0 0 -4px;
      border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 0 3px rgba(196, 83, 58, 0.18);
      transition: left 0.4s ease;
    }
    .foot-right {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.18em; color: var(--muted);
      display: flex; align-items: baseline; gap: 8px;
    }
    .foot-right-num {
      font-family: var(--font-display); font-style: italic;
      font-size: 18px; color: var(--ink);
      font-weight: 800;
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
</head>
<body>
  <div class="rotate">
    <div class="rotate-icon"></div>
    <div class="rotate-title"><em>Rotate your device</em></div>
    <div class="rotate-sub">PLAY IN LANDSCAPE</div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "Blush",
      "accent": "#c4533a"
    }/*EDITMODE-END*/;

    const PALETTES = {
      "Cream":    { bg:'#efe7d3', card:'#f7f1e0', ink:'#1a1612', inkSoft:'#4a4036', rule:'#d4c8a8', ruleSoft:'#e3d9bd', muted:'#7a6a4a', onAccent:'#fff' },
      "Blush":    { bg:'#f1e1dc', card:'#f9ece8', ink:'#1f1715', inkSoft:'#4a3a36', rule:'#dcc4bd', ruleSoft:'#ead7d0', muted:'#7a5e58', onAccent:'#fff' },
      "Pistachio":{ bg:'#dfe3cf', card:'#ebeed9', ink:'#1f2418', inkSoft:'#3f4734', rule:'#c2c8a8', ruleSoft:'#d5d9b9', muted:'#6a7058', onAccent:'#fff' },
      "Bone":     { bg:'#e6e1d6', card:'#efebe1', ink:'#181715', inkSoft:'#3e3c36', rule:'#c8c2b3', ruleSoft:'#dad3c2', muted:'#6e6a5e', onAccent:'#fff' },
      "Midnight": { bg:'#1f1d24', card:'#28252e', ink:'#f0eadb', inkSoft:'#c8c1ad', rule:'#3a3640', ruleSoft:'#332f3a', muted:'#8a8474', onAccent:'#1a1612' },
    };
    const ACCENTS = ['#c4533a', '#7a3a4a', '#3a5d4a', '#2a4a7a', '#a86e2a'];

    function applyTweaks(t) {
      const p = PALETTES[t.palette] || PALETTES.Blush;
      const r = document.documentElement.style;
      r.setProperty('--bg', p.bg);
      r.setProperty('--bg-card', p.card);
      r.setProperty('--ink', p.ink);
      r.setProperty('--ink-soft', p.inkSoft);
      r.setProperty('--rule', p.rule);
      r.setProperty('--rule-soft', p.ruleSoft);
      r.setProperty('--muted', p.muted);
      r.setProperty('--on-accent', p.onAccent);
      r.setProperty('--accent', t.accent);
    }

    const LOG_STEPS = [
      { tag: "01", text: "Crate-digging Spotify",       em: "47 candidates" },
      { tag: "02", text: "Filtering decades",            em: "80s · 90s · 00s · 10s" },
      { tag: "03", text: "Trimming for difficulty",      em: "medium" },
      { tag: "04", text: "Shuffling the order",          em: "" },
      { tag: "05", text: "Cueing first track",           em: "" },
    ];

    const Loading = () => {
      const [step, setStep] = React.useState(0);
      const [progress, setProgress] = React.useState(0);

      React.useEffect(() => {
        const total = 5000; // 5s total
        const start = performance.now();
        let raf;
        const tick = (t) => {
          const p = Math.min(1, (t - start) / total);
          setProgress(p);
          setStep(Math.min(LOG_STEPS.length, Math.floor(p * LOG_STEPS.length) + 1));
          if (p < 1) raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, []);

      const labelColors = ['#c4533a', '#3a5d4a', '#d4a13a'];

      return (
        <div className="app">
          <header className="head">
            <span>SIDE A · ISSUE NO. 047</span>
            <span className="head-c">— preparing your set —</span>
            <span>RESIDENT DJ AT WORK</span>
          </header>

          <section className="stage">
            <div className="crate">
              <div className="deck">
                <span className="spark"></span>
                <span className="spark"></span>
                <span className="spark"></span>
                <div className="platter"></div>

                {/* stacked records waiting to drop */}
                <div className="record stack-r3" style={{}}>
                  <div className="record-label" style={{background: labelColors[2]}}>03</div>
                  <div className="record-hole"></div>
                </div>
                <div className="record stack-r2">
                  <div className="record-label" style={{background: labelColors[1]}}>02</div>
                  <div className="record-hole"></div>
                </div>
                <div className="record stack-r1">
                  <div className="record-label" style={{background: labelColors[0]}}>01</div>
                  <div className="record-hole"></div>
                </div>

                {/* live record on the platter */}
                <div className="record live">
                  <div className="record-label" style={{background: 'var(--accent)'}}>SIDE A</div>
                  <div className="record-hole"></div>
                </div>

                <div className="arm"></div>
              </div>
            </div>

            <div className="info">
              <div className="info-kicker">
                <span className="info-kicker-dot"></span>
                <span>PREPARING YOUR SET</span>
              </div>
              <h1 className="info-title">
                Cueing<br/>
                <em>the first track…</em>
              </h1>
              <p className="info-tagline">
                Crate-digging Spotify for the songs <em>only your group could place</em>.
              </p>

              <div className="filter-row">
                <span className="filter">2 TEAMS</span>
                <span className="filter">80s · 90s · 00s · 10s</span>
                <span className="filter">MEDIUM</span>
                <span className="filter">ALL GENRES</span>
              </div>

              <div className="log">
                {LOG_STEPS.slice(0, step).map((s, i) => (
                  <div key={s.tag} className={`log-line${i < step - 1 ? ' done' : ''}`}>
                    <span className="log-line-tick">{i < step - 1 ? '✓' : '·'}</span>
                    <span>
                      <span style={{color: 'var(--muted)', marginRight: 6}}>{s.tag}</span>
                      {s.text}{s.em ? <> — <em>{s.em}</em></> : null}
                    </span>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <footer className="foot">
            <div className="foot-left">
              SIDE A · <em>track 01 of 47</em>
            </div>
            <div className="groove">
              <div className="groove-track"></div>
              <div className="groove-fill" style={{width: `${progress * 100}%`}}></div>
              <div className="groove-head" style={{left: `${progress * 100}%`}}></div>
            </div>
            <div className="foot-right">
              <span className="foot-right-num">{Math.round(progress * 100)}</span>
              <span>%</span>
            </div>
          </footer>
        </div>
      );
    };

    const App = () => {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      React.useEffect(() => { applyTweaks(tweaks); }, [tweaks]);
      return (
        <>
          <Loading />
          <TweaksPanel title="Tweaks">
            <TweakSection label="Palette">
              <TweakSelect
                label="Colors"
                value={tweaks.palette}
                options={Object.keys(PALETTES)}
                onChange={(v) => setTweak('palette', v)}
              />
              <TweakColor
                label="Accent"
                value={tweaks.accent}
                options={ACCENTS}
                onChange={(v) => setTweak('accent', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
