<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Side A — Game over</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:          #f1e1dc;
      --bg-card:     #f9ece8;
      --ink:         #1f1715;
      --ink-soft:    #4a3a36;
      --rule:        #dcc4bd;
      --rule-soft:   #ead7d0;
      --muted:       #7a5e58;
      --accent:      #c4533a;
      --accent-soft: #d4a13a;
      --on-accent:   #fff;
      --green:       #3a5d4a;
      --winner:      #c4533a;
      --font-display:'Playfair Display', serif;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      width: 100vw; height: 100vh;
    }

    /* portrait rotate prompt */
    .rotate {
      display: none;
      position: fixed; inset: 0;
      background: var(--bg);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      z-index: 9999; padding: 40px; text-align: center;
    }
    .rotate-icon {
      width: 56px; height: 80px;
      border: 2.5px solid var(--ink);
      border-radius: 8px;
      animation: rotate-icon 2s ease-in-out infinite;
    }
    @keyframes rotate-icon {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(90deg); }
    }
    .rotate-title { font-family: var(--font-display); font-style: italic; font-size: 32px; font-weight: 800; }
    .rotate-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.18em; color: var(--muted); }
    @media (orientation: portrait) and (max-width: 900px) {
      .rotate { display: flex; }
      .app { display: none !important; }
    }

    /* ─── app grid ─── */
    .app {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) minmax(0, 1.4fr) auto;
      grid-template-areas: "head" "hero" "timeline" "foot";
      width: 100vw; height: 100vh;
      max-width: 1400px; margin: 0 auto;
      padding: 12px calc(env(safe-area-inset-right, 0) + 24px) calc(env(safe-area-inset-bottom, 0) + 14px) calc(env(safe-area-inset-left, 0) + 24px);
      gap: 10px;
      position: relative;
    }

    /* ─── masthead ─── */
    .head {
      grid-area: head;
      display: flex; justify-content: space-between; align-items: center;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--rule);
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.22em; color: var(--muted);
    }
    .head-c {
      font-family: var(--font-display); font-style: italic;
      font-size: 14px; letter-spacing: 0;
      color: var(--ink);
    }

    /* ─── hero (winner) ─── */
    .hero {
      grid-area: hero;
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(160px, 24%);
      gap: 24px;
      align-items: center;
      min-height: 0;
      padding: 4px 0;
    }
    .hero-left {
      display: flex; flex-direction: column;
      justify-content: center;
      gap: 8px;
      min-width: 0;
    }
    .hero-kicker {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.28em; color: var(--accent);
      display: flex; align-items: center; gap: 10px;
    }
    .hero-kicker-rule { flex: 0 0 32px; border-top: 1px solid var(--accent); height: 0; }
    .winner-name {
      font-family: var(--font-display); font-style: italic;
      font-weight: 900;
      font-size: clamp(56px, 9vw, 100px);
      line-height: 0.86;
      letter-spacing: -0.04em;
      color: var(--winner);
      margin: 2px 0;
      display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    }
    .winner-name-tag {
      font-style: normal;
      font-weight: 800;
      font-size: 0.38em;
      letter-spacing: 0.02em;
      color: var(--ink-soft);
    }
    .winner-meta {
      display: flex; align-items: baseline; gap: 22px;
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.18em; color: var(--muted);
      margin-top: 6px;
    }
    .wm-item { display: flex; align-items: baseline; gap: 8px; }
    .wm-num {
      font-family: var(--font-display); font-style: italic;
      font-size: 22px; font-weight: 800; color: var(--ink);
      letter-spacing: -0.02em;
    }
    .wm-of { opacity: 0.5; }

    /* ─── right column: winner's stamp ─── */
    .hero-right {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      height: 100%;
    }
    .stamp {
      position: relative;
      width: 150px; height: 150px;
      border: 2px solid var(--winner);
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2px;
      transform: rotate(-8deg);
      color: var(--winner);
      box-shadow: inset 0 0 0 4px var(--bg);
    }
    .stamp::before, .stamp::after {
      content: ''; position: absolute;
      width: 80%; height: 1px; background: var(--winner);
      opacity: 0.6;
      left: 10%;
    }
    .stamp::before { top: 22%; }
    .stamp::after  { bottom: 22%; }
    .stamp-num {
      font-family: var(--font-display); font-style: italic;
      font-size: 48px; font-weight: 900; line-height: 1;
      letter-spacing: -0.03em;
    }
    .stamp-of {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.18em;
    }
    .stamp-tag {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.24em; margin-top: 4px;
    }

    /* ─── timeline (winner's collected cards) ─── */
    .tl-wrap {
      grid-area: timeline;
      display: flex; flex-direction: column;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid var(--rule);
      min-height: 0;
    }
    .tl-head {
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .tl-num {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.18em; color: var(--accent);
      border: 1px solid var(--accent); padding: 2px 6px;
    }
    .tl-title {
      font-family: var(--font-display); font-style: italic;
      font-size: 20px; font-weight: 800; line-height: 1;
      letter-spacing: -0.02em;
    }
    .tl-axis-rule { flex: 1; border-top: 1px solid var(--rule); height: 0; }
    .tl-sub {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.14em; color: var(--muted);
    }
    .tl-row {
      display: flex; align-items: center;
      gap: 6px;
      flex: 1;
      min-height: 0;
      justify-content: center;
    }
    .tl-foot-axis {
      display: flex; justify-content: space-between;
      font-family: 'JetBrains Mono', monospace; font-size: 8px;
      letter-spacing: 0.18em; color: var(--muted);
      flex-shrink: 0;
    }

    /* ─── card (winning timeline) ─── */
    .tlc {
      width: 68px; flex: 0 0 68px;
      height: 130px;
      background: var(--bg-card);
      border: 1px solid var(--ink);
      box-shadow: 0 2px 6px rgba(31, 23, 21, 0.08);
      padding: 8px 6px;
      display: flex; flex-direction: column;
      position: relative;
      flex-shrink: 0;
    }
    .tlc-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      position: absolute; top: 6px; right: 6px;
    }
    .tlc-year {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800; line-height: 1;
      letter-spacing: -0.04em;
      text-align: center;
      margin: auto 0 6px;
    }
    .tlc-year em { font-style: italic; color: var(--accent); }
    .tlc-meta {
      padding-top: 4px;
      border-top: 1px solid var(--rule);
      display: flex; flex-direction: column; gap: 2px;
    }
    .tlc-artist {
      font-family: var(--font-display); font-style: italic;
      font-size: 10px; font-weight: 700; line-height: 1.1;
      color: var(--ink);
      text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tlc-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px; line-height: 1.2;
      letter-spacing: 0.04em; color: var(--muted);
      text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ─── footer (standings + actions) ─── */
    .foot {
      grid-area: foot;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 18px;
      padding-top: 8px;
      border-top: 1px solid var(--rule);
    }
    .standings {
      display: flex; gap: 8px;
      flex-wrap: wrap;
    }
    .stand {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 14px;
      background: var(--bg-card); border: 1px solid var(--rule);
      min-width: 140px;
    }
    .stand.is-winner {
      background: var(--ink); color: var(--bg);
      border-color: var(--ink);
    }
    .stand-rank {
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.18em; opacity: 0.7;
    }
    .stand-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .stand-name { font-family: var(--font-display); font-style: italic; font-weight: 700; font-size: 15px; }
    .stand-num { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
    .stand-of { opacity: 0.5; font-size: 10px; }

    .actions {
      display: flex; gap: 8px;
    }
    .act {
      border: 1px solid var(--ink);
      cursor: pointer;
      padding: 12px 18px;
      text-align: left;
      transition: transform 0.15s;
      font-family: inherit;
      display: grid; grid-template-columns: 1fr auto;
      align-items: center; gap: 10px;
    }
    .act:hover { transform: translateY(-1px); }
    .act-secondary {
      background: transparent; color: var(--ink);
      min-width: 140px;
    }
    .act-primary {
      background: var(--ink); color: var(--bg);
      min-width: 220px;
    }
    .act-kicker {
      grid-column: 1; grid-row: 1;
      font-family: 'JetBrains Mono', monospace; font-size: 9px;
      letter-spacing: 0.22em; color: var(--accent-soft);
    }
    .act-secondary .act-kicker { color: var(--muted); }
    .act-title {
      grid-column: 1; grid-row: 2;
      font-family: var(--font-display); font-style: italic;
      font-size: 18px; font-weight: 800; line-height: 1;
    }
    .act-arrow { grid-column: 2; grid-row: 1 / 3; font-size: 18px; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
</head>
<body>
  <div class="rotate">
    <div class="rotate-icon"></div>
    <div class="rotate-title"><em>Rotate your device</em></div>
    <div class="rotate-sub">PLAY IN LANDSCAPE</div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "Blush",
      "accent": "#c4533a"
    }/*EDITMODE-END*/;

    const PALETTES = {
      "Cream":    { bg:'#efe7d3', card:'#f7f1e0', ink:'#1a1612', inkSoft:'#4a4036', rule:'#d4c8a8', ruleSoft:'#e3d9bd', muted:'#7a6a4a', onAccent:'#fff' },
      "Blush":    { bg:'#f1e1dc', card:'#f9ece8', ink:'#1f1715', inkSoft:'#4a3a36', rule:'#dcc4bd', ruleSoft:'#ead7d0', muted:'#7a5e58', onAccent:'#fff' },
      "Pistachio":{ bg:'#dfe3cf', card:'#ebeed9', ink:'#1f2418', inkSoft:'#3f4734', rule:'#c2c8a8', ruleSoft:'#d5d9b9', muted:'#6a7058', onAccent:'#fff' },
      "Bone":     { bg:'#e6e1d6', card:'#efebe1', ink:'#181715', inkSoft:'#3e3c36', rule:'#c8c2b3', ruleSoft:'#dad3c2', muted:'#6e6a5e', onAccent:'#fff' },
      "Midnight": { bg:'#1f1d24', card:'#28252e', ink:'#f0eadb', inkSoft:'#c8c1ad', rule:'#3a3640', ruleSoft:'#332f3a', muted:'#8a8474', onAccent:'#1a1612' },
    };
    const ACCENTS = ['#c4533a', '#7a3a4a', '#3a5d4a', '#2a4a7a', '#a86e2a'];

    function applyTweaks(t) {
      const p = PALETTES[t.palette] || PALETTES.Blush;
      const r = document.documentElement.style;
      r.setProperty('--bg', p.bg);
      r.setProperty('--bg-card', p.card);
      r.setProperty('--ink', p.ink);
      r.setProperty('--ink-soft', p.inkSoft);
      r.setProperty('--rule', p.rule);
      r.setProperty('--rule-soft', p.ruleSoft);
      r.setProperty('--muted', p.muted);
      r.setProperty('--on-accent', p.onAccent);
      r.setProperty('--accent', t.accent);
    }

    const WINNER = { name: "Anna", color: "#c4533a", score: 10 };
    const STANDINGS = [
      { name: "Anna",  color: "#c4533a", score: 10 },
      { name: "Jonas", color: "#3a5d4a", score: 7 },
    ];
    const WINNING_TIMELINE = [
      { year: 1968, artist: "The Beatles", title: "Hey Jude", color: "#c4533a" },
      { year: 1976, artist: "Eagles",      title: "Hotel California", color: "#7a3a4a" },
      { year: 1981, artist: "Queen & Bowie", title: "Under Pressure", color: "#3a5d4a" },
      { year: 1985, artist: "a-ha",        title: "Take On Me", color: "#d4a13a" },
      { year: 1989, artist: "Madonna",     title: "Like A Prayer", color: "#5a4a8a" },
      { year: 1995, artist: "Oasis",       title: "Wonderwall", color: "#2a4a7a" },
      { year: 1998, artist: "Cher",        title: "Believe", color: "#a86e2a" },
      { year: 2003, artist: "Beyoncé",     title: "Crazy In Love", color: "#a8527a" },
      { year: 2007, artist: "Rihanna",     title: "Umbrella", color: "#3a5d4a" },
      { year: 2011, artist: "Adele",       title: "Rolling In The Deep", color: "#c4533a" },
    ];

    const EndOfGame = () => {
      const winner = WINNER;
      const sorted = [...STANDINGS].sort((a,b) => b.score - a.score);
      React.useEffect(() => {
        document.documentElement.style.setProperty('--winner', winner.color);
      }, [winner.color]);

      const turns = 14;
      const missed = turns - winner.score;

      return (
        <div className="app">
          <header className="head">
            <span>SIDE A · ISSUE NO. 047</span>
            <span className="head-c">— end of side a —</span>
            <span>GAME OVER · {new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'}).toUpperCase()}</span>
          </header>

          <section className="hero">
            <div className="hero-left">
              <div className="hero-kicker">
                <span className="hero-kicker-rule"></span>
                <span>AND THE NEEDLE LIFTS ON</span>
              </div>
              <h1 className="winner-name">
                <span>{winner.name}</span>
                <span className="winner-name-tag">'s&nbsp;team</span>
              </h1>
              <div className="winner-meta">
                <span className="wm-item"><span className="wm-num">{winner.score}</span> CARDS</span>
                <span className="wm-item"><span className="wm-num">{turns}</span> TURNS</span>
                <span className="wm-item"><span className="wm-num">{missed}</span> MISSED</span>
              </div>
            </div>
            <div className="hero-right">
              <div className="stamp">
                <span className="stamp-num">{winner.score}</span>
                <span className="stamp-of">OF 10</span>
                <span className="stamp-tag">WINNER · MMXXVI</span>
              </div>
            </div>
          </section>

          <section className="tl-wrap">
            <div className="tl-head">
              <span className="tl-num">A1</span>
              <span className="tl-title"><em>Winning timeline</em> · {winner.name.toUpperCase()}</span>
              <span className="tl-axis-rule"></span>
              <span className="tl-sub">{WINNING_TIMELINE.length} CARDS</span>
            </div>
            <div className="tl-row">
              {WINNING_TIMELINE.map((c, i) => (
                <div className="tlc" key={i}>
                  <div className="tlc-dot" style={{background: c.color}}></div>
                  <div className="tlc-year"><em>{c.year}</em></div>
                  <div className="tlc-meta">
                    <div className="tlc-artist">{c.artist}</div>
                    <div className="tlc-title">{c.title}</div>
                  </div>
                </div>
              ))}
            </div>
            <div className="tl-foot-axis">
              <span>← {WINNING_TIMELINE[0].year}</span>
              <span>{WINNING_TIMELINE[WINNING_TIMELINE.length-1].year} →</span>
            </div>
          </section>

          <footer className="foot">
            <div className="standings">
              {sorted.map((t, i) => (
                <div key={i} className={`stand${i === 0 ? ' is-winner' : ''}`}>
                  <span className="stand-rank">0{i + 1}</span>
                  <span className="stand-dot" style={{background: t.color}}></span>
                  <span className="stand-name">{t.name}</span>
                  <span className="stand-num">{t.score}<span className="stand-of">/10</span></span>
                </div>
              ))}
            </div>
            <div className="actions">
              <button className="act act-secondary">
                <span className="act-kicker">HOME</span>
                <span className="act-title">Side A</span>
              </button>
              <button className="act act-primary">
                <span className="act-kicker">FLIP THE RECORD</span>
                <span className="act-title">Play again</span>
                <span className="act-arrow">→</span>
              </button>
            </div>
          </footer>
        </div>
      );
    };

    const App = () => {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      React.useEffect(() => { applyTweaks(tweaks); }, [tweaks]);
      return (
        <>
          <EndOfGame />
          <TweaksPanel title="Tweaks">
            <TweakSection label="Palette">
              <TweakSelect
                label="Colors"
                value={tweaks.palette}
                options={Object.keys(PALETTES)}
                onChange={(v) => setTweak('palette', v)}
              />
              <TweakColor
                label="Accent"
                value={tweaks.accent}
                options={ACCENTS}
                onChange={(v) => setTweak('accent', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
